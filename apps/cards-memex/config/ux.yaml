# User Experience Copy
# All user-facing messages in one place for easy iteration

# Thinking/loading states
thinking:
  default: "🔍 Searching my memory..."
  variants:  # Bot randomly picks one for variety
    - "🔍 Searching my memory..."
    - "🧠 Let me think about that..."
    - "📚 Checking my notes..."
    - "💭 Processing your question..."

# Success states
success:
  found_context: ""  # No prefix needed when we have good context
  low_confidence_prefix: "I'm not entirely certain, but based on what I've seen: "
  partial_match_prefix: "I found some related information: "

# Empty/error states  
empty_states:
  no_results: "I couldn't find anything relevant in my memory. Try rephrasing your question, or this topic might not have been discussed in threads I'm watching."
  no_context: "I don't have any context on this topic yet. Tag me in relevant Slack threads to help me learn!"
  
error_states:
  generic: "Something went wrong while processing your question. Please try again in a moment."
  rate_limited: "I'm getting a lot of questions right now. Please wait a moment and try again."
  api_error: "I'm having trouble connecting to my brain. Please try again shortly."

# Greeting and onboarding (for first-time DMs)
greeting:
  enabled: true
  first_dm: |
    👋 Hi! I'm your Cards Strategy assistant.
    
    I can answer questions about projects, decisions, and discussions from Slack threads I'm watching.
    
    **Try asking:**
    • "What's the status of [project name]?"
    • "What did we decide about [topic]?"
    • "Summarize recent discussions on [theme]"
    
    To expand my knowledge, tag me in important threads!

# Reactions (emoji responses in channels)
reactions:
  watching: "eyes"           # When bot starts watching a thread
  processing: "hourglass"    # While processing (optional)
  error: "x"                 # When something goes wrong
  
# Feedback prompts (optional, for future use)
feedback:
  enabled: false
  prompt: "Was this helpful? React with 👍 or 👎"
  
# Admin messages (ephemeral, for unauthorized users)
admin:
  unauthorized: "🔒 You're not authorized to use this bot. Please contact the Cards Strategy team if you need access."
  curator_only: "📚 Only curators can add threads to the knowledge base. You can still ask me questions via DM!"
  
# Thread monitoring confirmations
monitoring:
  started_watching: ""  # Empty = silent mode (just emoji reaction)
  # Alternative: "Got it! I'm now watching this thread."

